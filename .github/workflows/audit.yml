name: Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"  # every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run audit
        id: audit
        run: |
          CRITICAL=$(npm audit --json 2>/dev/null | jq '[.vulnerabilities | to_entries[].value | select(.severity == "critical")] | length' || echo 0)
          HIGH=$(npm audit --json 2>/dev/null | jq '[.vulnerabilities | to_entries[].value | select(.severity == "high")] | length' || echo 0)
          TOTAL=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.total' || echo 0)
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Open issue on critical vulnerabilities
        if: steps.audit.outputs.critical > 0
        uses: actions/github-script@v9
        with:
          script: |
            const critical = ${{ steps.audit.outputs.critical }};
            const high = ${{ steps.audit.outputs.high }};
            const total = ${{ steps.audit.outputs.total }};
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security: ${critical} critical vulnerabilit${critical === 1 ? 'y' : 'ies'} found in npm dependencies`,
              body: `## Security Audit Results\n\n- **Critical:** ${critical}\n- **High:** ${high}\n- **Total:** ${total}\n\nRun \`npm audit\` locally for full details. Dependabot should open fix PRs shortly.`,
              labels: ["security"],
            });
